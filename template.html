<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>karto — cartographie du SI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><g transform='translate(50,50)' fill='%23F5A623'><path transform='rotate(0)' d='M5,-7 C-11,-11 -22,-22 -16,-37 C-10,-51 8,-53 22,-45 C30,-40 33,-31 30,-23 C23,-9 13,-3 5,-7 Z'/><path transform='rotate(90)' d='M5,-7 C-11,-11 -22,-22 -16,-37 C-10,-51 8,-53 22,-45 C30,-40 33,-31 30,-23 C23,-9 13,-3 5,-7 Z'/><path transform='rotate(180)' d='M5,-7 C-11,-11 -22,-22 -16,-37 C-10,-51 8,-53 22,-45 C30,-40 33,-31 30,-23 C23,-9 13,-3 5,-7 Z'/><path transform='rotate(270)' d='M5,-7 C-11,-11 -22,-22 -16,-37 C-10,-51 8,-53 22,-45 C30,-40 33,-31 30,-23 C23,-9 13,-3 5,-7 Z'/></g></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..800&family=Geist+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAFA; --bg2:#F1F2F6; --card:#FFFFFF; --card2:#F5F6F9;
  --bd:rgba(15,23,41,.09); --bd2:rgba(15,23,41,.17);
  --tx:#0F1729; --tx2:#5B6472; --tx3:#9AA1AD;
  --pink:#5C57F4; --purple:#5C57F4; --cyan:#0EA5E9; --amber:#D97706; --green:#10B981;
  --indigo:#5C57F4; --orange:#EA580C; --teal:#0D9488; --rose:#5C57F4;
  --crit:#DC2626; --high:#EA580C; --med:#D97706; --low:#94A3B8;
  --grad:linear-gradient(135deg,#5C57F4,#7C78F7);
  --sh:0 1px 2px rgba(15,23,41,.05), 0 1px 3px rgba(15,23,41,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);background-image:radial-gradient(rgba(15,23,41,.045) 1px,transparent 1px);background-size:24px 24px;color:var(--tx);font-family:Geist,system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
code,.mono{font-family:'Geist Mono',monospace}
a{color:var(--purple);text-decoration:none}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:9px}

/* GATE */
#gate{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(rgba(15,23,41,.05) 1px,transparent 1px);background-size:24px 24px}
#gate .box{width:min(420px,90vw);background:var(--card);border:1px solid var(--bd);border-radius:20px;padding:34px;box-shadow:0 10px 40px rgba(15,23,41,.10);text-align:center}
#gate h1{font-size:20px;font-weight:700;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:6px}
#gate p{color:var(--tx2);font-size:13px;margin-bottom:20px}
.pwrap{position:relative}
#gate input{width:100%;padding:13px 40px 13px 15px;border-radius:12px;border:1px solid var(--bd2);background:rgba(15,23,41,.03);color:var(--tx);font-size:15px;font-family:'Geist Mono',monospace;text-align:center;letter-spacing:2px}
#gate button.peye{position:absolute;width:auto;margin:0;right:8px;top:50%;transform:translateY(-50%);background:none;border:0;box-shadow:none;border-radius:8px;cursor:pointer;color:var(--tx3);padding:5px 7px;line-height:0;display:flex;align-items:center}
#gate button.peye:hover{color:var(--purple);background:rgba(15,23,41,.04)}
#gate input:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 3px rgba(92,87,244,.16)}
#gate button{margin-top:14px;width:100%;padding:13px;border:0;border-radius:12px;background:var(--grad);color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
#gate .err{color:var(--pink);font-size:12px;margin-top:12px;min-height:16px}
#gate .lock{font-size:30px;margin-bottom:10px}
.gopt{margin-top:16px;font-size:12px;color:var(--tx2);display:flex;align-items:center;justify-content:center;gap:8px}
.gopt select{background:rgba(15,23,41,.03);color:var(--tx);border:1px solid var(--bd2);border-radius:8px;padding:5px 9px;font-family:inherit;font-size:12px;cursor:pointer}
.gopt select:focus{outline:none;border-color:var(--purple)}
#gate .hint2{font-size:10.5px;color:var(--tx3);margin-top:8px;line-height:1.4}
.savestat{font-size:12px;padding:5px 10px;border-radius:8px;white-space:nowrap;display:none}
.savestat.ok{display:inline-block;background:rgba(52,211,153,.14);color:var(--green)}
.savestat.wait{display:inline-block;background:rgba(251,191,36,.16);color:var(--amber)}
.savestat.err{display:inline-block;background:rgba(244,63,94,.14);color:var(--crit)}
.savestat.warn{display:inline-block;background:rgba(217,119,6,.14);color:var(--amber)}
.lockbtn{background:var(--card);border:1px solid var(--bd);border-radius:9px;padding:7px 11px;cursor:pointer;font-size:13px;color:var(--tx2)}
.lockbtn:hover{border-color:var(--bd2);color:var(--tx)}

/* SHELL */
#app{display:none;min-height:100vh}
header.top{position:sticky;top:0;z-index:20;backdrop-filter:blur(14px);background:rgba(255,255,255,.82);border-bottom:1px solid var(--bd);padding:14px 22px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:14px}
.brand{display:flex;align-items:center;gap:11px}
.brand .dot{display:flex;align-items:center;justify-content:center}
.brand .klogo{width:44px;height:44px;display:block}
.brand b{font-size:23px;font-weight:700;letter-spacing:-.5px}
.search{width:100%;max-width:560px;min-width:0;margin:0 auto;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--bd);border-radius:11px;padding:9px 14px}
.search input{background:none;border:0;color:var(--tx);font-family:inherit;font-size:13.5px;width:100%}.search input:focus{outline:none}
.search svg{opacity:.5;flex:0 0 auto}
.hdr-right{flex:0 0 auto;display:flex;align-items:center;gap:10px}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:10px;padding:18px 22px 6px}
.kpi{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:13px 15px;box-shadow:var(--sh)}
.kpi .n{font-size:25px;font-weight:800;line-height:1}
.kpi .l{font-size:11px;color:var(--tx2);margin-top:5px;text-transform:uppercase;letter-spacing:.5px}
.kpi.alert{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.08)}
.kpi.alert .n{color:var(--crit)}

/* TABS */
nav.tabs{display:flex;gap:4px;padding:6px 18px;overflow-x:auto;border-bottom:1px solid var(--bd);position:sticky;top:62px;background:rgba(255,255,255,.82);backdrop-filter:blur(14px);z-index:15}
nav.tabs button{white-space:nowrap;background:none;border:0;color:var(--tx2);font-family:inherit;font-size:13px;font-weight:500;padding:10px 14px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:7px}
nav.tabs button.on{background:var(--card2);color:var(--tx)}
nav.tabs button .b{background:var(--bd2);color:var(--tx);font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px}
nav.tabs button.crit .b{background:var(--crit);color:#fff}
.subtabs{display:flex;gap:3px;padding:7px 18px;overflow-x:auto;border-bottom:1px solid var(--bd);position:sticky;top:103px;background:rgba(255,255,255,.9);backdrop-filter:blur(14px);z-index:14}
.subtabs:empty{display:none}
.subtabs button{white-space:nowrap;background:none;border:0;color:var(--tx2);font-family:inherit;font-size:12px;font-weight:500;padding:6px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px}
.subtabs button.on{background:var(--bg2,var(--card2));color:var(--tx);box-shadow:inset 0 0 0 1px var(--bd)}
.subtabs button .b{background:var(--bd2);color:var(--tx);font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:20px}
.subtabs button.crit .b{background:var(--crit);color:#fff}

main{padding:20px 22px 60px;max-width:1500px;margin:0 auto}
.view{display:none;animation:fade .25s ease}.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
h2.sec{font-size:14px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;margin:22px 0 12px;display:flex;align-items:center;gap:8px}
h2.sec:first-child{margin-top:4px}

/* GRAPH */
.graphcard{margin-top:16px}
.graphcard-h{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.graphcard-h h3{font-size:13px;color:var(--tx2);text-transform:uppercase;letter-spacing:.6px}
.graphcard-h .ghh{font-size:11px;color:var(--tx3);font-family:'Geist Mono',monospace}
.graphwrap{position:relative;background:radial-gradient(120% 120% at 50% 32%,#1a0e44 0%,#0c0626 52%,#070318 100%);border:1px solid rgba(124,120,247,.28);border-radius:18px;overflow:hidden;height:min(68vh,620px);box-shadow:inset 0 0 80px rgba(92,87,244,.12)}
#graph{width:100%;height:100%;cursor:grab;display:block;touch-action:none}
#graph:active{cursor:grabbing}
.legend{position:absolute;top:12px;left:12px;display:flex;flex-direction:column;gap:6px;background:rgba(12,8,34,.55);border:1px solid rgba(255,255,255,.13);border-radius:12px;padding:10px 12px;backdrop-filter:blur(10px);box-shadow:0 8px 30px rgba(0,0,0,.35);max-width:180px}
.legend .li{display:flex;align-items:center;gap:8px;font-size:11.5px;color:#cfd2e8;cursor:pointer;user-select:none;transition:opacity .12s}
.legend .li:hover{color:#fff}
.legend .li.off{opacity:.32}
.legend .sw{width:11px;height:11px;border-radius:4px;flex:0 0 auto;box-shadow:0 0 7px currentColor}
.ghint{position:absolute;bottom:12px;left:12px;font-size:11px;color:rgba(207,210,232,.6);font-family:'Geist Mono',monospace}
.gpanel{position:absolute;top:12px;right:12px;width:min(290px,80%);background:rgba(14,9,38,.92);border:1px solid rgba(124,120,247,.34);border-radius:14px;padding:15px;backdrop-filter:blur(12px);box-shadow:0 12px 40px rgba(0,0,0,.5);display:none;max-height:calc(100% - 24px);overflow:auto;color:#e6e8fa}
.gpanel.on{display:block}
.gpanel .x{position:absolute;top:10px;right:12px;cursor:pointer;color:#9aa0c4;font-size:18px;line-height:1}
.gpanel .x:hover{color:#fff}
.gpanel .tag{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:6px;margin-bottom:8px}
.gpanel h3{font-size:16px;margin-bottom:8px;padding-right:18px;color:#fff}
.gpanel .kv{font-size:12px;color:#b7bbd8;margin:5px 0;line-height:1.5}
.gpanel .kv b{color:#fff;font-weight:600}
.gpanel .lk{font-size:11.5px;color:#c8cbe4;padding:4px 0;border-top:1px solid rgba(255,255,255,.1);margin-top:2px;display:flex;align-items:center;gap:7px}

/* CARDS / TABLES */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:16px;box-shadow:var(--sh)}
.card h3{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.card .sub{font-size:11.5px;color:var(--tx3);font-family:'Geist Mono',monospace;margin-bottom:10px;word-break:break-all}
.card .row{font-size:12.5px;color:var(--tx2);margin:6px 0;line-height:1.5}
.card .row b{color:var(--tx)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.chip{font-size:10.5px;padding:3px 11px;border-radius:20px;background:var(--card2);border:1px solid var(--bd);color:var(--tx2);text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:5px;line-height:1.7;white-space:nowrap;text-align:center}
.chipl:hover{border-color:var(--purple);color:var(--purple)}
.chain{display:flex;flex-direction:column;gap:7px;margin:6px 0 10px;padding:11px 13px;background:var(--card2);border:1px solid var(--bd);border-radius:12px}
.chrow{font-size:12.5px;display:flex;align-items:baseline;gap:10px}
.chl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);min-width:84px;flex:0 0 auto}
.chrow b{color:var(--tx);font-weight:600}
/* PROJETS — cartes à hauteur de contenu (pas d'étirement → pas de vide interne), matrice attributs juste sous la description (zéro prose en dur hors description) */
#projects{align-items:start}
#projects .card{display:flex;flex-direction:column}
#projects .p-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
#projects .p-name{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;min-width:0;line-height:1.3}
#projects .p-name span.nm{overflow-wrap:anywhere}
#projects .p-tags{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:9px}
.ptag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 9px;border-radius:7px;white-space:nowrap}
.ptag[data-tip]{cursor:help}
#projects .p-tech{font-size:11px;color:var(--tx3);font-family:'Geist Mono',monospace;line-height:1.55;overflow-wrap:anywhere}
#projects .p-desc{font-size:12.5px;color:var(--tx2);line-height:1.5;margin:10px 0 2px}
.pmatrix{margin-top:11px;border-top:1px solid var(--bd);padding-top:11px;display:grid;grid-template-columns:max-content minmax(0,1fr);gap:8px 12px;align-items:baseline}
.pmatrix .pk{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);line-height:1.7}
.pmatrix .pv{font-size:12.5px;color:var(--tx);min-width:0;display:flex;flex-wrap:wrap;gap:6px;align-items:center;overflow-wrap:anywhere}
.pmatrix .pv.muted2{color:var(--tx3);font-size:12px}
.schip{font-size:10.5px;padding:2px 9px;border-radius:7px;background:var(--card2);border:1px solid var(--bd);color:var(--tx2);display:inline-flex;align-items:center;gap:5px;text-decoration:none;white-space:nowrap;line-height:1.7}
a.schip:hover{border-color:var(--purple);color:var(--purple)}
.schip .ico{width:14px;height:14px}.schip .ico-img{width:13px;height:13px;border-radius:3px}.schip .ico-mono{width:13px;height:13px;font-size:8px}
.ico{display:inline-flex;width:20px;height:20px;flex:0 0 auto;align-items:center;justify-content:center;vertical-align:middle}
.ico-brand svg{width:100%;height:100%;display:block}
.ico-img{width:18px;height:18px;border-radius:4px;object-fit:contain}
.ico-mono{width:18px;height:18px;border-radius:5px;background:var(--card2);border:1px solid var(--bd);color:var(--tx2);font-size:9px;font-weight:700;align-items:center;justify-content:center;display:flex}
.appcell{display:flex;align-items:center;gap:9px}
.appref{display:inline-flex;align-items:center;cursor:help}
.appref[data-tip]{border-bottom:1px dotted var(--bd2)}
.netrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.netchip{display:inline-flex;border:1px solid var(--bd);border-radius:9px;padding:6px 11px;background:var(--card)}
/* PAS de -webkit-line-clamp ici : sur un <td> ça force display:-webkit-box, casse la cellule de tableau et fait déborder le texte sur la ligne suivante. On laisse la cellule s'enrouler et la ligne grandir (td déjà en vertical-align:top). */
.role-pl{color:var(--tx);font-size:12.5px;line-height:1.5;max-width:560px}
.det{color:var(--purple);white-space:nowrap;font-size:11.5px;font-weight:600}
.catpick{margin-bottom:14px;border:1px solid var(--bd);border-radius:14px;padding:13px 15px;background:var(--card);box-shadow:var(--sh)}
.catlbl{font-size:12px;font-weight:600;color:var(--tx);margin-bottom:9px}
.catpick .sin{width:100%}
.catgrid{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;max-height:190px;overflow:auto}
.catchip{display:inline-flex;align-items:center;gap:7px;font-size:12px;padding:5px 11px 5px 7px;border-radius:20px;border:1px solid var(--bd);background:var(--card2);color:var(--tx2);cursor:pointer;font-family:inherit}
.catchip:hover{border-color:var(--purple);color:var(--tx);background:#fff}
.catchip span{white-space:nowrap}
.catlist{display:flex;flex-direction:column;gap:1px;margin-top:9px;max-height:280px;overflow-y:auto;border:1px solid var(--bd);border-radius:10px;padding:5px}
.catrow{display:flex;align-items:center;gap:9px;width:100%;text-align:left;font-size:13px;padding:7px 9px;border-radius:8px;border:0;background:none;color:var(--tx);cursor:pointer;font-family:inherit}
.catrow:hover{background:var(--card2)}
.catrow .cn{font-weight:500}
.catrow .cc{margin-left:auto;font-size:11px}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
.bd-ok{background:rgba(52,211,153,.16);color:var(--green)} .bd-off{background:rgba(100,116,139,.2);color:var(--tx3)}
.bd-warn{background:rgba(251,191,36,.16);color:var(--amber)}

table{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--card);border:1px solid var(--bd);border-radius:14px;overflow:hidden;box-shadow:var(--sh)}
th{text-align:left;padding:11px 13px;color:var(--tx3);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--bd);background:rgba(15,23,41,.022)}
td{padding:10px 13px;border-bottom:1px solid var(--bd);color:var(--tx2);vertical-align:top}
tr:last-child td{border-bottom:0}
tr:hover td{background:rgba(15,23,41,.022)}
td b{color:var(--tx);font-weight:600}
.dot-s{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}

/* SECRETS */
.sec-val{font-family:'Geist Mono',monospace;font-size:11.5px;color:var(--tx3);letter-spacing:1px}
.reveal{cursor:pointer;color:var(--purple);font-size:11px;border:1px solid var(--bd2);border-radius:6px;padding:2px 7px;background:none;font-family:inherit}
.sin{width:100%;min-width:0;padding:6px 9px;border-radius:7px;border:1px solid var(--bd2);background:rgba(15,23,41,.03);color:var(--tx);font-family:'Geist Mono',monospace;font-size:11.5px}
.sin:focus{outline:none;border-color:var(--purple)}
.vbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.vbtn{font-size:12px;padding:7px 12px;border-radius:9px;border:1px solid var(--bd2);background:var(--card2);color:var(--tx);font-family:inherit;cursor:pointer}
.vbtn:hover{border-color:var(--bd2);background:var(--bd)}
.vbtn.prim{background:var(--grad);border:0;font-weight:700;color:#fff}
.vbtn.on{border-color:var(--purple);color:var(--purple);background:#fff}
.vbtn.sm{padding:3px 10px;font-size:11px}
.vbtn:disabled{opacity:.6;cursor:default}
.acctools{align-items:center}
.iconbtn{background:none;border:1px solid var(--bd);border-radius:8px;padding:3px 7px;cursor:pointer;font-size:12px;line-height:1}
.iconbtn:hover{border-color:var(--purple);background:var(--card2)}
.cardact{display:flex;align-items:center;gap:6px}
.card.editing{border-color:var(--purple);box-shadow:0 0 0 3px rgba(92,87,244,.10)}
.edlbl{font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.xlink{color:var(--purple);text-decoration:none;border-bottom:1px dotted rgba(92,87,244,.4)}
.xlink:hover{border-bottom-style:solid;color:#4338CA}
.idblk{margin-top:9px;border-top:1px solid var(--bd);padding-top:9px;display:flex;flex-direction:column;gap:4px}
.idline{font-size:12px;color:var(--tx2);display:grid;grid-template-columns:116px minmax(0,1fr);gap:10px;align-items:baseline}
.idline b{color:var(--tx3);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;line-height:1.35;align-self:start}
.idline .v{font-family:'Geist Mono',monospace;font-size:11.5px;word-break:break-all;min-width:0}
/* Comptes : cartes de hauteur égale + contenu structuré (zéro prose en dur) */
#accounts{grid-auto-rows:1fr}
#accounts .card{display:flex;flex-direction:column}
#accounts .card .grow{flex:1 1 auto}
.note-cl{font-size:11.5px;color:var(--tx3);line-height:1.45;margin:6px 0 2px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.acct-mail{display:flex;align-items:center;gap:6px;margin-top:6px;font-family:'Geist Mono',monospace;font-size:12px;color:var(--tx);word-break:break-all}
.acct-mail .mico{flex:0 0 auto;color:var(--purple);font-family:initial;font-size:12px}
.acct-mail .mval{font-weight:500}
.projblk{margin-top:9px;border-top:1px solid var(--bd);padding-top:9px;display:flex;flex-direction:column;gap:6px}

/* --- édition compte : architecture d'attributs (identité / secret / info) --- */

.su-link.inl{color:var(--purple);text-decoration:none;font-family:'Outfit',system-ui,sans-serif}
.addidwrap{margin-top:12px}

.cardhead{display:flex;align-items:center;justify-content:space-between;gap:8px}

.segbar{display:inline-flex;border:1px solid var(--bd2);border-radius:9px;overflow:hidden}

/* EXPOSURES */
.expo{border-left:3px solid var(--low);background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:11px}

.grphead{display:flex;align-items:center;gap:9px;margin:18px 0 8px}

.a360.center{align-items:center;justify-content:center;padding:24px}
/* popup centré : la box arrondie clippe (overflow:hidden) — la scrollbar interne ne dépasse plus des coins ; l'ombre est préservée (paint hors box). Le scroll vit sur .a360body. */
.a360.center .a360box{width:min(1080px,96vw);height:auto;max-height:88vh;border-left:none;border:1px solid var(--bd2);border-radius:20px;box-shadow:0 30px 80px rgba(15,23,41,.22);padding:0;overflow:hidden}

.ad-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.sy-chip{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--bd);border-radius:9px;padding:3px 10px 3px 7px}

<script>
const MODE="__MODE__";
const CAT={
  account:{c:'#A855F7',l:'Compte'}, project:{c:'#FF4D8F',l:'Projet'}, db:{c:'#38BDF8',l:'Base'},
  auto:{c:'#FBBF24',l:'Automatisation'}, scenario:{c:'#34D399',l:'Scénario Make'},
  webhook:{c:'#F472B6',l:'Webhook'}, connector:{c:'#818CF8',l:'Connecteur'},
  host:{c:'#FB923C',l:'Hébergement'}, domain:{c:'#2DD4BF',l:'Domaine'}
};
const catOf=k=>CAT[k]||{c:'#94a3b8',l:String(k||'?')};
// valeurs dérivées de la data (source unique) plutôt que hardcodées — fallback si absent
const makeTeam=()=>(((DATA&&DATA.cloud&&DATA.cloud.make&&DATA.cloud.make.team)||'').match(/\((\d+)\)/)||[,'934955'])[1];
const hetznerIp=()=>(((DATA&&DATA.cloud&&DATA.cloud.hetzner&&DATA.cloud.hetzner.vps)||'').match(/(\d+\.\d+\.\d+\.\d+)/)||[,''])[1];
let DATA=null, SIM=null, PASS=null, EDIT=false, graphBuilt=false;
let APPAR={loading:false,data:null,err:null,loaded:false}, apparCount=null;
let accEdit=new Set(), catOpen=false, _ssTxt='', _ssCls='';
const OVL='carto_overlay';
let INV={mode:'table',group:'domaine',crit:'',type:''};   // état vue Inventaire
const SELF_B64="__SELF__";                 // template auto-réécrivable (rempli au build)
const M_PAY='__'+'PAYLOAD'+'__', M_SELF='__'+'SELF'+'__';   // marqueurs (jamais littéraux ici)

/* ---------- crypto ----------
   La passphrase n'est JAMAIS conservée : on garde son matériel de clé PBKDF2 (CryptoKey
   NON-extractible). Pour « rester déverrouillé » ce CryptoKey est stocké dans IndexedDB —
   les octets de la passphrase ne sont jamais exposés ni au JS ni au localStorage. */
async function importKeymat(passStr){ return crypto.subtle.importKey('raw',new TextEncoder().encode(passStr),'PBKDF2',false,['deriveKey']); }
async function deriveKey(km,salt,iter,use){
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:iter,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,[use]);
}
const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
function u8b64(u){let s='';for(let i=0;i<u.length;i+=0x8000)s+=String.fromCharCode.apply(null,u.subarray(i,i+0x8000));return btoa(s);}
const b64utf8=b=>new TextDecoder().decode(Uint8Array.from(atob(b),c=>c.charCodeAt(0)));
async function decryptPayload(km,p){
  const key=await deriveKey(km,b64d(p.salt),p.iter,'decrypt');
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(p.iv)},key,b64d(p.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
async function encryptModel(model,km){
  const enc=new TextEncoder();
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const iter=600000;
  const key=await deriveKey(km,salt,iter,'encrypt');
  const ct=new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM',iv},key,enc.encode(JSON.stringify(model))));
  return {salt:u8b64(salt),iv:u8b64(iv),ct:u8b64(ct),iter};
}
/* coffre de session : IndexedDB stocke le CryptoKey (km) non-extractible ; localStorage ne garde que l'expiration */
const KIDB={db:'karto-sess',store:'km',key:'keymat'};
function _idb(){return new Promise((res,rej)=>{const r=indexedDB.open(KIDB.db,1);r.onupgradeneeded=()=>r.result.createObjectStore(KIDB.store);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function idbPutKey(km,exp){const db=await _idb();return new Promise((res,rej)=>{const tx=db.transaction(KIDB.store,'readwrite');tx.objectStore(KIDB.store).put({km,exp},KIDB.key);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
async function idbGetKey(){try{const db=await _idb();return await new Promise((res,rej)=>{const rq=db.transaction(KIDB.store,'readonly').objectStore(KIDB.store).get(KIDB.key);rq.onsuccess=()=>res(rq.result||null);rq.onerror=()=>rej(rq.error);});}catch(e){return null;}}
async function idbDelKey(){try{const db=await _idb();await new Promise(res=>{const tx=db.transaction(KIDB.store,'readwrite');tx.objectStore(KIDB.store).delete(KIDB.key);tx.oncomplete=res;tx.onerror=res;});}catch(e){}}
function dl(name,content,type){const b=new Blob([content],{type:type||'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),2000);}
async function buildVaultHtml(){
  const enc=await encryptModel(DATA,PASS);
  const core=b64utf8(SELF_B64);
  return core.split(M_PAY).join(JSON.stringify(enc)).split(M_SELF).join(SELF_B64);
}
async function saveVault(){
  if(MODE!=='enc'||!PASS){alert('Réservé au mode chiffré : ouvre le dashboard avec ta passphrase.');return;}
  const btn=document.getElementById('saveBtn'); if(btn){btn.textContent='⏳ Chiffrement…';btn.disabled=true;}
  try{
    dl('index.html', await buildVaultHtml());
    if(btn){btn.textContent='✓ Copie téléchargée';setTimeout(()=>{btn.textContent='⬇ Copie locale';btn.disabled=false;},2500);}
  }catch(e){alert('Échec : '+e.message);if(btn){btn.disabled=false;}}
}
/* ---------- AUTO-SAVE serveur (sans bouton) ---------- */
const HOSTED = location.protocol==='https:';   // actif uniquement sur l'URL hébergée (Caddy)
let _savedSig=null,_lastSig=null,_stable=0,_saving=false;
function _sig(o){const s=JSON.stringify(o);let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0;}return s.length+':'+h;}
function setSaveStatus(t,cls){_ssTxt=t;_ssCls=cls||'';const el=document.getElementById('saveStatus');if(el){el.textContent=t;el.className='savestat '+(cls||'');}}
async function autoSaveNow(sig){
  _saving=true; setSaveStatus('Sync…','wait');
  let okLocal=false, okServer=true;
  try{ localStorage.setItem(OVL, JSON.stringify(await encryptModel(DATA,PASS))); okLocal=true; }catch(e){}
  let serverTried=false;
  if(HOSTED){ serverTried=true; try{ const r=await fetch('/save',{method:'PUT',headers:{'Content-Type':'text/html'},body:await buildVaultHtml()}); okServer=r.ok; }catch(e){ okServer=false; } }
  _savedSig=sig;
  // Badge HONNÊTE : vert UNIQUEMENT si réellement propagé au coffre serveur.
  if(!okLocal){ setSaveStatus('⚠ Échec sauvegarde','err'); }
  else if(serverTried && okServer){ setSaveStatus('✓ Sauvegardé (serveur)','ok'); }
  else if(serverTried && !okServer){ setSaveStatus('⚠ Serveur KO — navigateur seul','warn'); }

function autoSaveTick(){
  if(MODE!=='enc'||!PASS||_saving) return;
  const sig=_sig(DATA);
  if(_savedSig===null){_savedSig=sig;_lastSig=sig;return;}   // baseline : pas de save au chargement
  if(sig===_savedSig){_lastSig=sig;return;}                  // rien de neuf
  if(sig===_lastSig){_stable++;}else{_stable=0;_lastSig=sig;} // attend la fin de frappe
  if(_stable>=1){_stable=0;autoSaveNow(sig);}
}

async function applyOverlay(km){
  let ov; try{ ov=JSON.parse(localStorage.getItem(OVL)||'null'); }catch(e){ return; }
  if(!ov) return;
  let dec; try{ dec=await decryptPayload(km,ov); }catch(e){ return; }   // clé changée → ignore l'overlay
  if(!dec||!dec.meta) return;
  const fileBuilt=(DATA.meta&&DATA.meta.builtAt)||'', ovBuilt=dec.meta.builtAt||'';
  if(ovBuilt===fileBuilt){ DATA=dec; }                       // même build → l'overlay est l'état le plus récent
  else {                                                      // le fichier a été régénéré → garder la topo fraîche, réinjecter les comptes ajoutés main
    const key=a=>(a.provider||'')+'|'+(a.identity||'');
    const have=new Set((DATA.cloud.accounts||[]).map(key));
    const byKey=new Map((dec.cloud.accounts||[]).map(a=>[key(a),a]));
    for(const a of DATA.cloud.accounts){ const o=byKey.get(key(a)); if(o&&o.email&&!a.email)a.email=o.email; }  // email manuel reporte
    for(const a of (dec.cloud.accounts||[])) if(!have.has(key(a))) DATA.cloud.accounts.push(a);
    if(Array.isArray(dec.logins)&&dec.logins.length) DATA.logins=dec.logins;   // coffre identifiants = manuel → survit au rebuild
    if(Array.isArray(dec.deviceArchive)) DATA.deviceArchive=dec.deviceArchive; // appareils archivés = manuel → survit au rebuild
  }
}
function exportEnv(path){
  const rows=DATA.secrets.filter(s=>s.path===path);
  const body=rows.map(s=>{const k=s.name.split(/[\s(]/)[0];const v=(s.value&&s.value!=='<redacted>')?s.value:'';return /^[A-Za-z0-9_]+$/.test(k)?`${k}=${v}`:`# ${s.name}`;}).join('\n');
  dl((path.split('/').pop()||'env')+'.txt','# '+path+'\n# Exporté depuis la cartographie IT — '+DATA.meta.generated+'\n'+body+'\n','text/plain');
}

// construit le graphe dès que le conteneur a une largeur réelle (évite un build à 0px au démarrage)
function watchGraph(){
  const build=()=>{ if(!graphBuilt){ buildGraph(); graphBuilt=true; return true; } return false; };
  const gw=document.querySelector('.graphwrap'); if(!gw) return;
  if(typeof ResizeObserver!=='undefined'){
    const ro=new ResizeObserver(es=>{ if(es[0].contentRect.width>50 && build()) ro.disconnect(); });
    ro.observe(gw);
  }
  let t=0; (function poll(){ if(graphBuilt) return; const w=document.querySelector('.graphwrap'); if(w&&w.clientWidth>50){ build(); return; } if(t++<40) requestAnimationFrame(poll); })();
}

/* ---------- DONNÉES STRATÉGIQUES (localisation + résilience) ---------- */
const SENS={secret:{c:'#DC2626',l:'Secret'},interne:{c:'#D97706',l:'Interne'},public:{c:'#10B981',l:'Public'}};
const ROLECLR={'primaire':'#5C57F4','réplica':'#0EA5E9','backup':'#0D9488','runtime':'#D97706','travail':'#94A3B8'};
const RESCLR={ok:'#10B981',warn:'#D97706',crit:'#DC2626'};
const RESLBL={ok:'Protégée',warn:'À renforcer',crit:'Risque'};
function canaux(){ return (DATA.dataAssets&&DATA.dataAssets.canaux)||{}; }
// règles softcodées : recalculées à l'affichage (reflètent toute édition future des data)
function resilienceOf(a){
  const cx=canaux(), emp=a.emplacements||[], issues=[];
  const durable=emp.filter(e=>{const c=cx[e.canal];return c&&/^durable/.test(c.trust);});
  const clear=emp.filter(e=>e.chiffre===false);
  const remoteClear=a.sensibilite==='secret'&&emp.some(e=>{const c=cx[e.canal];return c&&c.remote&&e.chiffre===false;});
  if(remoteClear) issues.push({lvl:'crit',t:'Secret en clair sur un canal distant'});
  if(a.sensibilite==='secret'&&clear.length) issues.push({lvl:'warn',t:'Encore en clair : '+clear.map(e=>e.canal).join(', ')});
  if(durable.length<2) issues.push({lvl:'warn',t:durable.length?'Une seule copie durable — point de défaillance unique':'Aucune copie durable hors de ce poste'});
  const lvl=issues.some(x=>x.lvl==='crit')?'crit':issues.some(x=>x.lvl==='warn')?'warn':'ok';
  return {lvl,issues,durable:durable.length};
}
function computeResilience(){
  const A=(DATA.dataAssets&&DATA.dataAssets.assets)||[];
  let ok=0,warn=0,crit=0; A.forEach(a=>{const l=resilienceOf(a).lvl; if(l==='ok')ok++;else if(l==='warn')warn++;else crit++;});
  return {ok,warn,crit,total:A.length};
}

  const issues=r.issues.length?r.issues.map(x=>`<div class="kv" style="color:${RESCLR[x.lvl]}">${x.lvl==='crit'?'🔴':'🟠'} ${esc(x.t)}</div>`).join(''):`<div class="kv" style="color:${RESCLR.ok}">🟢 Suffisamment répliquée et protégée</div>`;

      <span class="muted" style="font-size:11.5px">${r.durable} copie(s) durable(s)</span></div>
    <div class="kv" style="margin-top:6px"><b>Diagnostic</b></div>${issues}

  ['inventory','Inventaire',[['inventory','Inventaire']]],
  ['appareils','Appareils',[['appareils','Appareils']]],

  ['projects','Projets',[['projects','Projets']]],
  ['flux','Bases & flux',[['cloud','Cloud & Bases'],['connectors','Connecteurs']]],
  ['autos','Automatisations',[['autos','Automatisations']]],

  ['secdata','Sécurité & données',[['security','Sécurité'],['data','Données']]],
  ['systeme','Système',[['ops','Système'],['files','Fichiers'],['kb','Base de connaissances']]],
  ['ia','IA',[['ia','IA']]],
];
const groupOf=v=>GROUPS.find(g=>g[2].some(c=>c[0]===v));
let curGroup=null, groupChild={};
function childBadge(v){
  let n='', crit=false;
  if(v==='security'){ if(DATA.kpis.exposures)n=DATA.kpis.exposures; crit=DATA.kpis.critical>0; }
  else if(v==='autos')n=DATA.kpis.automations;
  else if(v==='secrets')n=DATA.kpis.secrets;
  else if(v==='inventory')n=DATA.kpis.assets;
  else if(v==='kb'&&DATA.kpis.bridges)n=DATA.kpis.bridges;
  else if(v==='appareils'&&apparCount)n=apparCount;
  else if(v==='registry'&&DATA.accountRegistry&&DATA.accountRegistry.total)n=DATA.accountRegistry.total;
  else if(v==='data'){ const r=computeResilience(); if(r.total){ n=r.ok+'/'+r.total; crit=r.crit>0; } }
  return {b:n===''?'':`<span class="b">${n}</span>`, crit};
}
function lazyView(v){
  if(v==='overview'){ if(!graphBuilt){buildGraph();graphBuilt=true;} else if(SIM)SIM.kick(); }
  if(v==='files'&&!FILES.data&&!FILES.loading)fsLoad(FILES.path);
  if(v==='appareils')apparLoad();
}
function renderSubtabs(){
  const sub=document.getElementById('subtabs'); if(!sub)return;
  const g=GROUPS.find(x=>x[0]===curGroup);
  if(!g||g[2].length<2){ sub.innerHTML=''; return; }
  const cur=groupChild[curGroup]||g[2][0][0];
  sub.innerHTML=g[2].map(([v,l])=>{const {b,crit}=childBadge(v);return `<button data-c="${v}" class="${v===cur?'on':''} ${crit?'crit':''}">${l}${b}</button>`;}).join('');
  sub.querySelectorAll('button').forEach(btn=>btn.onclick=()=>showChild(curGroup,btn.dataset.c));
}
function showChild(gid,v){
  groupChild[gid]=v;
  document.querySelectorAll('.view').forEach(s=>s.classList.toggle('on',s.dataset.v===v));
  renderSubtabs();
  lazyView(v);
}
function selectGroup(gid){
  curGroup=gid;
  document.getElementById('tabs').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x.dataset.g===gid));
  const g=GROUPS.find(x=>x[0]===gid);
  showChild(gid, groupChild[gid]||g[2][0][0]);
}
function gotoTab(v){ const g=groupOf(v); if(g)selectGroup(g[0]),showChild(g[0],v); }
function renderTabs(){
  const nav=document.getElementById('tabs');
  if(!curGroup)curGroup='overview';
  nav.innerHTML=GROUPS.map(([gid,label,children])=>{
    let b='',crit=false;
    if(children.length===1){ const cb=childBadge(children[0][0]); b=cb.b; crit=cb.crit; }
    else crit=children.some(c=>childBadge(c[0]).crit);
    return `<button data-g="${gid}" class="${gid===curGroup?'on':''} ${crit?'crit':''}">${label}${b}</button>`;
  }).join('');
  nav.querySelectorAll('button').forEach(btn=>btn.onclick=()=>selectGroup(btn.dataset.g));
  renderSubtabs();
}

// résolveurs dynamiques (aucun lien en dur — tout vient des données)
function accUrl(name){ if(!name)return null; const tok=String(name).split(/[-\s(]/)[0]; const a=(DATA.cloud.accounts||[]).find(x=>new RegExp(tok,'i').test(x.provider)||new RegExp(String(x.provider).split(/[-\s]/)[0],'i').test(name)); return a&&a.url||null; }
function repoOf(p){ for(const r of (p.gitRemotes||[])){ const m=r.match(/github\.com[:/]([\w.-]+\/[\w.-]+?)(?:\.git)?(?:\s|$)/); if(m)return {label:m[1],url:'https://github.com/'+m[1]}; } return null; }
function dbsOf(p){ const n=p.name.toLowerCase().split(/[\s(]/)[0]; return (DATA.cloud.supabase.projects||[]).filter(s=>(s.app||'').toLowerCase().includes(n)).map(s=>({label:'Supabase · '+s.name,url:'https://supabase.com/dashboard/project/'+s.ref})); }
function hostOf(p){ const h=p.hosting||''; if(/netlify/i.test(h))return {label:'Netlify',url:p.deployUrl||accUrl('Netlify')}; if(/hetzner/i.test(h))return {label:'Hetzner VPS',url:accUrl('Hetzner')}; if(/vercel/i.test(h))return {label:'Vercel',url:p.deployUrl||accUrl('Vercel')}; if(!h||/^(none|local|unknown)/i.test(h)||/(^|\b)local\b/i.test(h))return null; return {label:h.split(/[(—]/)[0].trim(),url:p.deployUrl||null}; }
// taxonomie de type — le libellé/couleur sont normés ; LE TYPE LUI-MÊME vient des données (p.type), pas du code
const PROJ_TYPE={
  app:        {label:'Application',      c:'#5C57F4', tip:'Application avec une interface : on l’ouvre et on s’en sert.'},
  automation: {label:'Automatisation',   c:'#EA580C', tip:'Chaîne de scripts planifiés, sans interface — tourne toute seule en arrière-plan.'},
  fork:       {label:'Fork open-source', c:'#0D9488', tip:'Dérivé d’un dépôt public, avec une surcouche personnelle privée.'},
  lib:        {label:'Bibliothèque',     c:'#0EA5E9', tip:'Brique de code réutilisable, sans interface ni déploiement propre.'}
};
function tint(hex,a){const n=parseInt(String(hex).slice(1),16);return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}
function pvLink(item){ return item.url?lnk(item.url,esc(item.label)):`<b>${esc(item.label)}</b>`; }
function svcChip(name){ const u=accUrl(name); const inner=`${iconHtml(name)}<span>${esc(name)}</span>`; return u?`<a class="schip" href="${esc(safeUrl(u))}" target="_blank" rel="noopener">${inner}</a>`:`<span class="schip">${inner}</span>`; }
function pRow(k,html,empty){ return `<div class="pk">${k}</div><div class="pv${html?'':' muted2'}">${html||esc(empty||'—')}</div>`; }

function renderProjects(){

/* taxonomie kinds/tiers : source de vérité = data/automation_taxonomy.json (kinds/tiers) ; les maps ci-dessus servent de repli. Lecture à l'exécution (DATA est peuplé en async). */
function _kindMeta(k){return (DATA&&DATA.autoTax&&DATA.autoTax.kinds&&DATA.autoTax.kinds[k])||null;}
function kindIcoRaw(k){const m=_kindMeta(k);return (m&&m.ico)||STEPICO[k];}

function tierLblRaw(t){const m=_tierMeta(t);return (m&&m.label)||TIERLBL[t];}
function tierClrRaw(t){const m=_tierMeta(t);return (m&&m.color)||TIERCLR[t];}
function tierPlainRaw(t){const m=_tierMeta(t);return (m&&m.plain)||TIERHELP[t];}
function claudeMark(s){s=s||18;const N=12,cx=12,cy=12,out=[];for(let i=0;i<N;i++){const ang=i/N*Math.PI*2-Math.PI/2,lng=i%3===0,r1=lng?3:4.4,r2=lng?11:9;out.push(`<line x1="${(cx+Math.cos(ang)*r1).toFixed(1)}" y1="${(cy+Math.sin(ang)*r1).toFixed(1)}" x2="${(cx+Math.cos(ang)*r2).toFixed(1)}" y2="${(cy+Math.sin(ang)*r2).toFixed(1)}"/>`);}return `<svg viewBox="0 0 24 24" width="${s}" height="${s}" style="vertical-align:-4px;flex:0 0 auto" aria-hidden="true"><g stroke="#D97757" stroke-width="2.1" stroke-linecap="round">${out.join('')}</g></svg>`;}

/* aides UX : tooltips légers + popup « schéma de chaîne » façon Make (icônes fidèles via iconHtml) */

  for(const key in KINDHELP){if(k.includes(key))return KINDHELP[key];}

const CHAINI='<svg class="aname-i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6" cy="6" r="2.3"/><circle cx="6" cy="18" r="2.3"/><circle cx="18" cy="12" r="2.3"/><path d="M8 7.4 16 11M8 16.6 16 13"/></svg>';
function stepIco(s){return s.app?iconHtml(s.app):`<span class="mk-emo">${kindIcoRaw(s.k)||'•'}</span>`;}
function chainFlow(chain){

/* détecte la nature d'une tâche par mots-clés (nom + does + kind) → {tag, object, verb} ; bibliothèque data/automation_taxonomy.json → nature */
function inferNature(a){
  const lib=(DATA.autoTax&&DATA.autoTax.nature)||[];
  const hay=((a.name||'')+' '+(a.does||'')+' '+(a.kind||'')).toLowerCase();
  for(const n of lib)if((n.kw||[]).some(k=>hay.includes(k)))return n;
  return null;
}
/* phrase résumé GÉNÉRÉE (zéro texte écrit à la main) : composée depuis la chaîne + la bibliothèque de langage (data/automation_taxonomy.json) */
function frList(arr,and){if(!arr.length)return '';if(arr.length===1)return arr[0];return arr.slice(0,-1).join(', ')+' '+(and||'et')+' '+arr[arr.length-1];}
function autoSummary(a){
  const tax=DATA.autoTax||{},kc=tax.kindCat||{},ph=tax.phrase||{};
  const chain=a.chain||[],catId=s=>s.cat||kc[s.k]||'produce';
  const cap=s=>s?s.charAt(0).toUpperCase()+s.slice(1):s;
  // nettoyage final global : espaces multiples, espace avant ponctuation, mots-outils dupliqués
  const tidy=s=>String(s).replace(/\s+/g,' ').replace(/\s+([.,;:])/g,'$1').replace(/\b(le|la|les|du|de|des|sur|et|à)\s+\1\b/gi,'$1').replace(/\s+/g,' ').trim();
  const when=cadenceLabel(a.schedule)+(clockLabel(a.schedule)?' à '+clockLabel(a.schedule):'');
  const prod=chain.find(s=>catId(s)==='produce');
  let producer;
  const prodAppRaw=(prod&&prod.app&&prod.app!=='Claude')?prod.app:null;
  if(prodAppRaw)producer=prodAppRaw;
  else if(a.claudeTier)producer=tierLblRaw(a.claudeTier);
  else if(prod)producer=kindLabelRaw(prod.k)||(ph.fallbackActor||'le système');
  else producer=ph.fallbackActor||'le système';
  const nat=inferNature(a);
  const verb=(nat&&nat.verb)||(ph.produceByKind||{})[prod?prod.k:'_default']||(ph.produceByKind||{})._default||'exécute';
  const obj=(nat&&nat.object)||ph.defaultObject||'sa tâche du jour';
  producer=toolAs(producer);
  // host dé-jargonné (« VPS » → « serveur »), sans l'IP ni les chemins techniques
  let host=a.host?cleanAcct(a.host).replace(/\bVPS\b/gi,'serveur').trim():'';
  let hostPhrase=host?`${ph.on||'sur'} le ${host}`:'';
  // INTELLIGENCE DE TEXTE — dé-redondance producteur/hôte : s'ils désignent le même
  // fournisseur (ex. producteur « Hetzner » + hôte « serveur Hetzner B CAPITAL »), on ne
  // garde que l'hôte (plus précis, il porte le nom de la machine) et on retire le doublon.
  if(host&&prodAppRaw&&host.toLowerCase().includes(prodAppRaw.toLowerCase())){
    producer=/^le\s/i.test(host)?host:('le '+host);
    hostPhrase='';
  }
  const edges=a.edges||[],byKey={};chain.forEach(s=>{if(s.key)byKey[s.key]=s;});
  const lbl=s=>{if(!s)return '';if(s.app==='Claude'&&a.claudeTier)return tierLblRaw(a.claudeTier);const t=toolInfo(s.app);return (t&&t.label)||s.app||kindLabelRaw(s.k)||s.k;};
  const uniqA=arr=>[...new Set(arr.filter(Boolean))];
  const nCtl=chain.filter(s=>catId(s)==='control').length,nFb=chain.filter(s=>catId(s)==='safety').length;
  const nets=[];
  if(nCtl)nets.push(`${nCtl} ${(ph.controlWord||{})[nCtl>1?'n':'1']||'contrôle'}`);
  if(nFb)nets.push(`${nFb} ${(ph.fallbackWord||{})[nFb>1?'n':'1']||'secours'}`);
  const netsTxt=nets.length?` ${ph.controlLead||'Filets'} : ${frList(nets,ph.and)}.`:'';
  // chemin EXACT via les arêtes : ce que le producteur LIT (sources entrantes) vs ÉCRIT (sorties), + diffusion & destinataires
  if(edges.length&&prod&&prod.key){
    const readSteps=edges.filter(e=>e.to===prod.key&&e.kind==='source').map(e=>byKey[e.from]).filter(Boolean);
    const reads=uniqA(readSteps.map(lbl));
    // glose « mémoire » seulement si la source lue EST un magasin anti-répétition (sinon faux)
    const memKw=tax.memoryKw||[];
    const readsAreMemory=readSteps.some(s=>{const h=((s.n||'')+' '+(s.note||'')+' '+(s.out||'')).toLowerCase();return memKw.some(k=>h.includes(k));});
    const outs=edges.filter(e=>e.from===prod.key).map(e=>byKey[e.to]).filter(Boolean);
    const stores=uniqA(outs.filter(n=>catId(n)==='source').map(lbl));
    // pour une étape de production intermédiaire (ex. rendu), on décrit ce qu'elle PRODUIT (out),
    // pas la plateforme qui héberge son code (GitHub n'« exécute »/ne « met en forme » rien).
    const mades=uniqA(outs.filter(n=>catId(n)==='produce').map(n=>n.out||lbl(n)));
    const delN=chain.filter(s=>catId(s)==='deliver'),delK=delN.map(s=>s.key);
    const deliver=uniqA(delN.map(lbl));
    const audiences=uniqA(edges.filter(e=>delK.includes(e.to)&&e.kind==='source').map(e=>lbl(byKey[e.from])));
    let s1=`${cap(when)}, ${producer}${hostPhrase?` ${hostPhrase}`:''} ${verb} ${obj}`;
    if(reads.length)s1+=`, ${ph.readsLead||'après avoir consulté'} ${frList(reads,ph.and)}${readsAreMemory&&ph.memoryGloss?` (${ph.memoryGloss})`:''}`;
    s1+='.';
    const mids=[];
    if(stores.length)mids.push(`${ph.storeLead||'enregistré dans'} ${frList(stores,ph.and)}`);
    if(mades.length)mids.push(`${ph.renderLead||'mis en forme en'} ${frList(mades,ph.and)}`);
    let s2='';
    if(deliver.length){s2=`${ph.resultLead||'Le résultat est'} ${mids.length?mids.join(', ')+`, ${ph.andThen||'puis'} `:''}${ph.deliverVia||'envoyé via'} ${frList(deliver,ph.and)}`;if(audiences.length)s2+=` ${ph.toAudience||'aux destinataires tenus à jour depuis'} ${frList(audiences,ph.and)}`;s2+='.';}
    else if(mids.length)s2=`${ph.resultLead||'Le résultat est'} ${mids.join(', ')}.`;
    return tidy(s1+(s2?' '+s2:'')+netsTxt);
  }
  // repli (chaînes sans arêtes explicites) : ancienne formulation par catégorie
  const uniq=ids=>{const seen=new Set(),r=[];for(const s of chain){if(!ids.includes(catId(s)))continue;const n=s.app;if(!n||seen.has(n))continue;seen.add(n);r.push(n);}return r;};
  const sources=uniq(['source']),deliver=uniq(['deliver']);
  let lead=`${cap(when)}, ${producer}${hostPhrase?` ${hostPhrase}`:''} ${verb} ${obj}`;
  if(sources.length)lead+=` ${ph.from||'à partir de'} ${frList(sources,ph.and)}`;
  const segs=[lead];
  if(deliver.length)segs.push(`${ph.deliver||"puis l'envoie via"} ${frList(deliver,ph.and)}`);
  return tidy(segs.join(', ')+'.'+netsTxt);
}
/* synthèse « en clair » de l'automatisation, dérivée de la chaîne + bibliothèque de mots-clés (data/automation_taxonomy.json) */
function syChip(name,sub){return `<span class="sy-chip">${iconHtml(name)}<span class="sy-cn">${esc(name)}${sub?`<small>${esc(sub)}</small>`:''}</span></span>`;}
function autoSynth(a){
  const tax=DATA.autoTax||{},kc=tax.kindCat||{},cat=tax.cat||{},ob=tax.outByKind||{};
  const chain=a.chain||[],catId=s=>s.cat||kc[s.k]||'produce';
  const grp=id=>{const seen=new Set(),r=[];for(const s of chain){if(catId(s)!==id)continue;const name=s.app||kindLabelRaw(s.k)||s.k,out=s.out||ob[s.k]||'',key=name+'|'+out;if(seen.has(key))continue;seen.add(key);r.push({name,out});}return r;};
  const ic=id=>cat[id]&&cat[id].ico||'•',lb=id=>cat[id]&&cat[id].label||id;
  const rows=[];
  const nat=inferNature(a);const tags=(a.tags&&a.tags.length)?a.tags:(nat?[nat.tag]:[]);

// logos : résolus depuis un domaine (table éditable data + dérivation comptes) → favicon. Repli monogramme.
function domainFor(name){
  if(!name)return null;
  const esc2=s=>String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const map=(DATA.cloud&&DATA.cloud.vendorDomains)||{};
  for(const k in map){ if(k!=='_doc'&&new RegExp(esc2(k),'i').test(name))return map[k]; }
  const tok=String(name).split(/[\s(]/)[0];
  const cat=(DATA.appCatalog||[]).find(a=>new RegExp('^'+esc2(a.name),'i').test(name)||new RegExp(esc2(tok),'i').test(a.name));
  if(cat)return cat.domain;
  const acc=(DATA.cloud.accounts||[]).find(a=>new RegExp(esc2(tok),'i').test(a.provider));
  if(acc&&acc.url){ try{return new URL(acc.url).hostname.replace(/^www\./,''); }catch(e){} }
  return null;
}
function brandIcon(name){const m=DATA.brandIcons||{};for(const k in m){if(k==='_doc')continue;try{if(new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i').test(name))return m[k];}catch(e){}}return null;}
/* uniquifie les id internes d'un SVG (gradients, etc.) à chaque rendu : sans ça, plusieurs instances du même logo de marque dans la page partagent les mêmes id → collision → rendu blanc (cf. icône SharePoint dans le popup). */
let _icoSeq=0;
function uniqSvgIds(svg){_icoSeq++;const sfx='_k'+_icoSeq;return String(svg).replace(/(id="|url\(#)([A-Za-z][\w-]*)/g,(m,p,id)=>p+id+sfx);}
function iconHtml(name){
  const b=brandIcon(name);if(b)return `<span class="ico ico-brand">${uniqSvgIds(b)}</span>`;
  const d=domainFor(name);
  const init=((String(name).match(/[A-Za-z0-9]/)||['?'])[0]).toUpperCase();
  if(!d)return `<span class="ico"><span class="ico-mono">${init}</span></span>`;
  return `<span class="ico"><img class="ico-img" src="https://www.google.com/s2/favicons?domain=${esc(d)}&sz=64" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="ico-mono" style="display:none">${init}</span></span>`;
}
function appCell(name){ const d=domainFor(name); return `<div class="appcell">${iconHtml(name)}${d?lnk('https://'+d,esc(name)):`<b>${esc(name)}</b>`}</div>`; }

function esc(v){return String(v).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ---------- clipboard ---------- */
function fallbackCopy(text,cb){const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');cb&&cb();}catch(e){}ta.remove();}
function cpyVal(text,btn){
  if(!text||text==='<redacted>')return;
  const done=()=>{const t=btn.textContent;btn.textContent='\u2713';btn.classList.add('done');setTimeout(()=>{btn.textContent=t;btn.classList.remove('done');},1100);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));}
  else fallbackCopy(text,done);
}

        const pw=l.password?`<div class="pwfield"><span class="lbl">Mot de passe</span><span class="sec-val val" id="pw${i}">••••••••••</span><button class="reveal" data-pwr="${i}">voir</button><button class="cpy" data-pwc="pw.${i}" title="Copier">📋</button></div>`:'';

  el.querySelectorAll('[data-pwgen]').forEach(b=>b.onclick=()=>{DATA.logins[+b.dataset.pwgen].password=pwGen(20);renderLogins();});

  const sb=document.getElementById('pwsaveBtn'); if(sb)sb.onclick=saveVault;

/* ---------- APPAREILS (parc machines — snapshot runtime poussé par les collecteurs) ---------- */
const DEV_ICON={laptop:'💻',desktop:'🖥️',server:'🗄️',phone:'📱',tablet:'📓',watch:'⌚',tv:'📺',audio:'🎧',other:'🔌'};
const DEV_TYPE_LABEL={laptop:'Ordinateurs portables',desktop:'Ordinateurs fixes',server:'Serveurs',phone:'Téléphones',tablet:'Tablettes',watch:'Montres',tv:'TV / boîtiers',audio:'Audio',other:'Autres'};
const DEV_SRC={agent:{t:'🛰️ agent local',h:'Profil complet collecté sur la machine'},appleid:{t:'☁︎ Apple ID',h:'Remonté via le compte Apple (métadonnées)'},manual:{t:'✎ manuel',h:'Saisi à la main'}};
async function apparLoad(force){
  if(APPAR.loaded&&!force&&APPAR.data)return;
  APPAR.loading=true;APPAR.err=null;renderAppareils();
  try{
    const r=await fetch('/appareils.json'+(force?'?_t='+Date.now():''),{credentials:'include',cache:force?'reload':'default'});
    if(!r.ok)throw new Error('inventaire indisponible (HTTP '+r.status+') — aucun collecteur n\'a encore poussé d\'appareils');
    APPAR.data=await r.json();apparCount=(APPAR.data.devices||[]).length;
  }catch(e){APPAR.err=e.message||String(e);APPAR.data=null;}
  APPAR.loading=false;APPAR.loaded=true;renderAppareils();
  if(document.getElementById('kpis'))renderKpis();
  if(document.getElementById('tabs'))renderTabs();
}
function devRow(label,val){return val?`<div class="chrow"><span class="chl">${esc(label)}</span><b>${esc(String(val))}</b></div>`:'';}
function devSrcLatest(devs){const m={};for(const d of devs){if(d.lastSeen&&(!m[d.source]||d.lastSeen>m[d.source]))m[d.source]=d.lastSeen;}return m;}
function devStatus(d,srcLatest){
  if((DATA.deviceArchive||[]).includes(d.id))return 'archivé';      // archivé à la main → toujours inactif
  const now=Date.now()/1000;
  if(d.source==='agent'){ if(d.lastSeen&&now-d.lastSeen>7*86400)return 'inactif'; }   // agent muet >7j = machine éteinte/partie
  else { const lt=srcLatest[d.source]||0; if(d.lastSeen&&lt-d.lastSeen>6*3600)return 'inactif'; }  // a raté la dernière collecte de sa source
  return null;
}
function toggleArchive(id){
  DATA.deviceArchive=DATA.deviceArchive||[];
  const i=DATA.deviceArchive.indexOf(id);
  if(i>=0)DATA.deviceArchive.splice(i,1);else DATA.deviceArchive.push(id);
  renderAppareils();                          // l'auto-save (signature DATA) propage au coffre
}
function devCard(d,status){
  const ic=DEV_ICON[d.type]||DEV_ICON.other, src=DEV_SRC[d.source]||DEV_SRC.manual;
  const osLine=[d.os,d.osVersion].filter(Boolean).join(' ');
  const sub=[d.brand,d.model].filter(Boolean).join(' · ');
  const arch=(DATA.deviceArchive||[]).includes(d.id);
  const sc=status==='archivé'?'<span class="chip" style="background:var(--bd2)">🗄️ archivé</span>'
    :status==='inactif'?'<span class="chip" style="background:var(--bd2)">⏸ inactif</span>':'';
  const dim=status?'opacity:.55;filter:grayscale(.85)':'';
  return `<div class="card" style="${dim}" data-search="${esc(((d.name||'')+' '+(d.model||'')+' '+(d.os||'')+' '+(d.brand||'')).toLowerCase())}">
    <div class="cardhead"><h3 style="margin:0;display:flex;align-items:center;gap:8px"><span style="font-size:20px">${ic}</span>${esc(d.name||'Appareil')}</h3>
      <div style="display:flex;gap:6px;align-items:center">${sc}<span class="chip" title="${esc(src.h)}">${src.t}</span></div></div>
    ${sub?`<div class="sub" style="margin-top:5px">${esc(sub)}</div>`:''}
    <div class="chain" style="margin-top:9px">
      ${devRow('Système',osLine)}
      ${devRow('Puce',d.chip)}
      ${devRow('Mémoire',d.ram)}
      ${devRow('Stockage',d.storage)}
      ${devRow('Réseau',d.ip)}
      ${d.battery?devRow('Batterie',d.battery+' %'):''}
      ${devRow('Uptime',d.uptime)}
      ${d.serial?devRow('N° série',d.serial):''}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
      ${d.lastSeen?`<span class="muted" style="font-size:11px">Vu le ${fsDate(d.lastSeen)}</span>`:'<span></span>'}
      <button class="vbtn" data-arch="${esc(d.id)}" title="${arch?'Le réintégrer comme actif':'Le garder en trace, grisé — appareil que tu n\'as plus'}">${arch?'Réactiver':'Archiver'}</button>
    </div>
  </div>`;
}
function renderAppareils(){
  const el=document.querySelector('[data-v="appareils"]');if(!el)return;
  const gen=APPAR.data&&APPAR.data.generated_iso?`<span class="muted" style="font-size:11.5px">Snapshot du ${esc(APPAR.data.generated_iso)}</span>`:'';
  const grp=(arr,stat)=>{
    const order=Object.keys(DEV_TYPE_LABEL);
    const types=order.filter(t=>arr.some(d=>d.type===t)).concat([...new Set(arr.map(d=>d.type))].filter(t=>!order.includes(t)));
    return types.map(t=>{const list=arr.filter(d=>d.type===t);
      return `<h4 style="margin:18px 0 8px;color:var(--tx2);font-weight:600">${esc(DEV_TYPE_LABEL[t]||t)} <span class="muted">· ${list.length}</span></h4>
        <div class="grid">${list.map(d=>devCard(d,stat.get(d.id))).join('')}</div>`;}).join('');
  };
  let main, head='';
  if(APPAR.loading)main='<div class="muted">Chargement de l\'inventaire…</div>';
  else if(APPAR.err)main=`<div class="warnbar">⚠ ${esc(APPAR.err)} — les collecteurs <span class="mono">tools/fleet/</span> poussent <span class="mono">appareils.json</span> sur le VPS (agent Mac + Apple ID).</div>`;
  else if(APPAR.data&&(APPAR.data.devices||[]).length){
    const devs=APPAR.data.devices.slice();
    const srcLatest=devSrcLatest(devs);
    const stat=new Map(devs.map(d=>[d.id,devStatus(d,srcLatest)]));
    const active=devs.filter(d=>!stat.get(d.id)), inactive=devs.filter(d=>stat.get(d.id));
    head=`${active.length} actif${active.length>1?'s':''}${inactive.length?` · ${inactive.length} inactif${inactive.length>1?'s':''}`:''}`;
    main=grp(active,stat);
    if(inactive.length)main+=`<h4 style="margin:28px 0 6px;color:var(--tx2);font-weight:600">🗄️ Inactifs / archivés <span class="muted">· ${inactive.length}</span></h4>
      <div class="muted" style="font-size:11.5px;margin-bottom:8px">Conservés pour mémoire — appareils que tu n'as plus ou plus vus récemment. « Réactiver » pour les réintégrer.</div>
      <div class="grid">${inactive.map(d=>devCard(d,stat.get(d.id))).join('')}</div>`;
  } else main='<div class="muted">Aucun appareil pour l\'instant. Lance le collecteur : <span class="mono">bash tools/fleet/setup-fleet.command</span> (Mac) et <span class="mono">apple_devices.py</span> (iPhone).</div>';
  const bar=`<div class="fbar" style="margin-bottom:12px"><b style="font-size:14px">Appareils</b>${head?`<span class="muted" style="font-size:12px;margin-left:8px">· ${head}</span>`:''}<div style="flex:1"></div>${gen}<button class="vbtn" id="apparReload" title="Recharger">↻</button></div>`;
  el.innerHTML=bar+main;
  const rb=document.getElementById('apparReload');if(rb)rb.onclick=()=>apparLoad(true);
  el.querySelectorAll('[data-arch]').forEach(b=>b.onclick=()=>toggleArchive(b.dataset.arch));
}

/* ---------- FICHIERS (navigateur de serveurs via karto-fs, lecture seule) ---------- */
const SERVERS=[
  {id:'vps',label:'Serveur (VPS)',sub:'héberge karto',base:'',kind:'fs',ico:'Hetzner'},
  {id:'icloud',label:'iCloud Drive',sub:'snapshot quotidien · métadonnées seules',kind:'snap',url:'/icloud-snapshot.json',emoji:'☁️'}
];
let FILES={server:'vps',path:'/',loading:false,data:null,err:null,preview:null};
function curServer(){return SERVERS.find(x=>x.id===FILES.server);}
function fsBase(){const s=curServer();return (typeof window.__FSBASE!=='undefined'?window.__FSBASE:(s?s.base:''))||'';}
const SNAP={};
async function snapFetch(s,force){
  if(SNAP[s.id]&&!force)return SNAP[s.id];
  const r=await fetch(s.url+(force?(s.url.includes('?')?'&':'?')+'_t='+Date.now():''),{credentials:'include',cache:force?'reload':'default'});
  if(!r.ok)throw new Error('snapshot indisponible (HTTP '+r.status+') — l\'indexeur iCloud n\'a pas encore poussé de fichier sur le VPS');
  SNAP[s.id]=await r.json();return SNAP[s.id];
}
function snapDir(snap,path){
  if(path==='/'||!path)return {children:snap.tree};
  let cur=snap.tree,node=null;
  for(const seg of path.split('/').filter(Boolean)){
    node=(cur||[]).find(x=>x.n===seg&&x.t==='d');
    if(!node)return null;
    cur=node.c||[];
  }
  return {children:cur,node};
}
function humanSize(n){if(n==null)return '';const u=['o','Ko','Mo','Go','To'];let i=0,v=n;while(v>=1024&&i<u.length-1){v/=1024;i++;}return (i?v.toFixed(1):v)+'\u202f'+u[i];}
function fsDate(t){if(!t)return '';const d=new Date(t*1000),p=n=>String(n).padStart(2,'0');return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;}
function fileIco(e){if(e.type==='dir')return '📁';const x=(e.name.split('.').pop()||'').toLowerCase();
  if(['png','jpg','jpeg','gif','svg','webp','ico'].includes(x))return '🖼️';
  if(['env','envrc'].includes(x)||/^\.env/.test(e.name))return '🔑';
  if(['js','mjs','ts','py','sh','json','yml','yaml','html','css','md','txt','log','conf','service','caddy','sql'].includes(x))return '📄';
  if(['zip','gz','tar','tgz','xz','bz2'].includes(x))return '🗜️';
  return '📄';}
function fsJoin(p,name){return (p==='/'?'':p)+'/'+name;}
async function fsLoad(path,force){
  FILES.loading=true;FILES.err=null;FILES.preview=null;renderFiles();
  const s=curServer();
  try{
    if(s&&s.kind==='snap'){
      const snap=await snapFetch(s,force);
      const d=snapDir(snap,path);
      if(!d)throw new Error('dossier introuvable dans le snapshot');
      const entries=(d.children||[]).map(n=>({name:n.n,type:n.t==='d'?'dir':'file',size:n.s,mtime:n.m,link:n.link,cloud:n.cloud,more:n.more,error:n.err}));
      const segs=path.split('/').filter(Boolean);
      FILES.data={path:path||'/',parent:segs.length?'/'+segs.slice(0,-1).join('/'):'/',entries,snap:true,
        note:(d.node&&d.node.more&&!(d.node.c))?'Profondeur d\'indexation max atteinte — le contenu de ce dossier n\'est pas dans le snapshot.':(snap.generated_iso?'Snapshot du '+snap.generated_iso:'')};
      FILES.path=path||'/';
    } else {
      const r=await fetch(fsBase()+'/fs/list?path='+encodeURIComponent(path),{credentials:'include'});
      if(!r.ok){let j={};try{j=await r.json();}catch(e){}throw new Error(j.error||('HTTP '+r.status));}
      FILES.data=await r.json();FILES.path=FILES.data.path;
    }
  }catch(e){FILES.err=e.message||String(e);FILES.data=null;}
  FILES.loading=false;renderFiles();
}
async function fsOpen(e){
  const full=fsJoin(FILES.path,e.name);
  if(e.type==='dir')return fsLoad(full);
  if(FILES.data&&FILES.data.snap){FILES.preview={name:e.name,full,meta:true,size:e.size,mtime:e.mtime,cloud:e.cloud};renderFiles();return;}
  FILES.loading=true;FILES.err=null;renderFiles();
  try{
    const r=await fetch(fsBase()+'/fs/read?path='+encodeURIComponent(full),{credentials:'include'});
    const ct=(r.headers.get('Content-Type')||'').toLowerCase();
    if(ct.includes('application/json')){const j=await r.json();if(j.tooBig){FILES.preview={name:e.name,full,tooBig:true,size:j.size};} else if(j.error){throw new Error(j.error);}}
    else{
      const buf=await r.arrayBuffer();
      if(ct.startsWith('image/')){FILES.preview={name:e.name,full,image:URL.createObjectURL(new Blob([buf],{type:ct}))};}
      else{
        const bytes=new Uint8Array(buf);let bin=false;const lim=Math.min(bytes.length,4096);
        for(let i=0;i<lim;i++){if(bytes[i]===0){bin=true;break;}}
        if(bin)FILES.preview={name:e.name,full,binary:true,ct:ct||'binaire'};
        else FILES.preview={name:e.name,full,text:new TextDecoder('utf-8',{fatal:false}).decode(bytes)};
      }
    }
  }catch(err){FILES.err=err.message||String(err);}
  FILES.loading=false;renderFiles();
}
function renderFiles(){
  const el=document.querySelector('[data-v="files"]');if(!el)return;
  const chips=SERVERS.map(s=>{const ico=s.emoji?`<span class="ico" style="display:inline-flex;align-items:center;justify-content:center">${s.emoji}</span>`:iconHtml(s.ico||'Hetzner');const host=s.kind==='fs'?hetznerIp():'';return `<button class="srvchip ${FILES.server===s.id?'on':''}" data-srv="${s.id}">${ico}<span><b>${esc(s.label)}</b><i>${esc((host?host+' · ':'')+s.sub)}</i></span></button>`;}).join('');
  const parts=FILES.path==='/'?['']:FILES.path.split('/');
  let acc='';
  const crumbs=parts.map((p,i)=>{acc=i===0?'/':acc+(acc.endsWith('/')?'':'/')+p;const go=acc;return `<button class="crumb" data-go="${esc(go)}">${esc(p||'racine')}</button>`;}).join('<span class="csep">/</span>');
  let main;
  if(FILES.loading)main='<div class="muted">Chargement…</div>';
  else if(FILES.err)main=`<div class="warnbar">⚠ ${esc(FILES.err)} — le navigateur de fichiers nécessite le backend <span class="mono">karto-fs</span> sur le VPS${(DATA.hosted&&DATA.hosted.url)?` (disponible sur ${esc(DATA.hosted.url)})`:''}.</div>`;
  else if(FILES.data){
    const rows=FILES.data.entries.map(e=>`<tr data-search="${esc(e.name.toLowerCase())}" data-name="${esc(e.name)}" data-type="${e.type}">
      <td><span class="fico">${fileIco(e)}</span><b>${esc(e.name)}</b>${e.cloud?' <span class="muted" title="Dans iCloud — pas téléchargé localement">☁︎</span>':''}${e.link?' <span class="muted" title="lien symbolique">↪</span>':''}${e.more?' <span class="muted" title="Non indexé (profondeur max)">…</span>':''}${e.error?` <span class="muted">(${esc(e.error)})</span>`:''}</td>
      <td class="mono">${e.type==='dir'?'—':humanSize(e.size)}</td>
      <td class="muted">${fsDate(e.mtime)}</td>
      <td>${e.type==='file'&&!e.error&&!FILES.data.snap?`<a class="cpy dl" href="${fsBase()}/fs/read?path=${encodeURIComponent(fsJoin(FILES.path,e.name))}&download=1" title="Télécharger">⬇</a>`:''}</td></tr>`).join('');
    const note=FILES.data.note?`<div class="muted" style="font-size:11.5px;margin:2px 0 8px">${esc(FILES.data.note)}</div>`:'';
    main=note+`<table><thead><tr><th>Nom</th><th>Taille</th><th>Modifié</th><th></th></tr></thead><tbody>${rows||'<tr><td colspan="4" class="muted">(dossier vide)</td></tr>'}</tbody></table>`;
  } else main='<div class="muted">Sélectionne un serveur — le contenu se charge à l\'ouverture de l\'onglet.</div>';
  let prev='';
  if(FILES.preview){const p=FILES.preview;
    prev=`<div class="fprev"><div class="fprevhd"><b>${esc(p.full||p.name)}</b>${p.meta?'':`<a class="vbtn" href="${fsBase()}/fs/read?path=${encodeURIComponent(p.full)}&download=1">⬇ Télécharger</a>`}<button class="vbtn" id="fprevClose">fermer</button></div>`
      +(p.meta?`<div class="muted" style="padding:13px">Snapshot iCloud — <b>métadonnées seules</b>.<br>Taille ${humanSize(p.size)} · modifié ${fsDate(p.mtime)}${p.cloud?' · ☁︎ pas téléchargé localement':''}.<br>Le contenu des fichiers iCloud n'est pas indexé (aucun téléchargement déclenché).</div>`
        :p.tooBig?`<div class="muted" style="padding:13px">Fichier volumineux (${humanSize(p.size)}) — aperçu désactivé, télécharge-le.</div>`
        :p.binary?`<div class="muted" style="padding:13px">Fichier binaire (${esc(p.ct)}) — télécharge-le pour l'ouvrir.</div>`
        :p.image?`<img src="${p.image}" alt="${esc(p.name)}">`
        :`<pre class="fcode">${esc(p.text)}</pre>`)
      +`</div>`;
  }
  el.innerHTML=`<div class="srvbar">${chips}</div>
    <div class="fbar"><button class="vbtn" data-go="${esc((FILES.data&&FILES.data.parent)||'/')}" ${FILES.path==='/'?'disabled':''}>↑ Parent</button><div class="crumbs">${crumbs}</div><button class="vbtn" id="fReload" title="Recharger">↻</button></div>
    ${prev}${main}`;
  el.querySelectorAll('[data-srv]').forEach(b=>b.onclick=()=>{FILES.server=b.dataset.srv;fsLoad('/');});
  el.querySelectorAll('[data-go]').forEach(b=>{if(!b.disabled)b.onclick=()=>fsLoad(b.dataset.go);});
  el.querySelectorAll('tr[data-type] td b').forEach(bx=>bx.onclick=()=>{const tr=bx.closest('tr');const e=(FILES.data.entries||[]).find(x=>x.name===tr.dataset.name);if(e)fsOpen(e);});
  const rc=document.getElementById('fReload');if(rc)rc.onclick=()=>fsLoad(FILES.path,true);
  const pc=document.getElementById('fprevClose');if(pc)pc.onclick=()=>{FILES.preview=null;renderFiles();};
}

/* ---------- SECURITY ---------- */
function renderSecurity(){
  const order={critical:0,high:1,medium:2,low:3};
  const SS=(DATA.autoTax&&DATA.autoTax.secStatus)||{};
  const st=e=>SS[e.status||'open']||SS.open||{label:e.status||'à traiter',emoji:'🔴',done:false};
  const statusChip=e=>{const s=st(e);return `<span class="sec-st" title="${esc(s.label)}" style="font-size:11px;padding:2px 8px;border-radius:999px;background:var(--bd2);border:1px solid var(--bd);color:var(--tx2);white-space:nowrap">${s.emoji||''} ${esc(s.label)}</span>`;};
  const ex=[...DATA.exposures].sort((a,b)=>order[a.severity]-order[b.severity]);
  // widget « reste à faire » : tout ce qui n'est pas clos
  const todo=ex.filter(e=>!st(e).done);
  const todoHtml=todo.length?`
    <div class="expo" style="border-left-color:var(--g1);margin-bottom:14px">
      <div class="what">🛠️ Reste à faire — ${todo.length} action(s) de sécurité non clôturée(s)</div>
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">
        ${todo.map(e=>`<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:13px">
          <span class="sev" style="text-transform:uppercase;font-size:10px">${esc(e.severity)}</span>
          ${statusChip(e)}
          <span>${esc(e.what.replace(/^\[[^\]]+\]\s*/,'').slice(0,110))}${e.what.length>110?'…':''}</span>
          ${e.owner?`<span class="muted" style="font-size:11px">· ${esc(e.owner)}</span>`:''}
          ${e.due?`<span class="muted" style="font-size:11px">· échéance ${esc(e.due)}</span>`:''}
        </div>`).join('')}
      </div>
    </div>`:`<div class="expo" style="border-left-color:var(--ok,#3fb950);margin-bottom:14px"><div class="what">✅ Aucune action de sécurité en attente.</div></div>`;

function safeUrl(url){const u=String(url||'').replace(/[\u0000-\u001F\u007F]/g,'').trim();return /^[a-z][a-z0-9+.-]*:/i.test(u)?(/^(https?|mailto):/i.test(u)?u:'#'):u;}

function addFromCatalog(i){

function acctEmail(a){
  if(a.email)return a.email.trim();
  const re=/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/;
  if(a.identity){const m=String(a.identity).match(re);if(m)return m[0];}
  for(const d of (a.ids||[])){ if(/mail|email|compte|login|identifiant/i.test(d.k||'')||/@/.test(d.v||'')){const m=String(d.v||'').match(re);if(m)return m[0];} }
  return '';
}
// Architecture d'attributs — chaque attribut porte une catégorie :
//   'info'   = softcode LECTURE SEULE (refs / URL / IDs maintenus dans data/cloud_inventory.json) — pas une case à remplir.
//   'secret' = credential, avec mode de stockage `store` :
//              'here' (chiffré dans le coffre karto) · 'bw' (référencé Bitwarden, non dupliqué) · 'none' (Sans stockage volontaire).
//   'id'     = identifiant éditable (login, email, compte…).
// Rétro-compat : ancien flag "ro":true ≡ cat:'info'.
function attrCat(d){ return (d&&d.cat) ? d.cat : ((d&&d.ro) ? 'info' : (isSecretLabel((d&&d.k)||'') ? 'secret' : 'id')); }
function attrStore(d){ return (d&&d.store) ? d.store : 'here'; }
const STORE_MODES=[['here','🔒','Stocké ici'],['bw','🛡','Bitwarden'],['none','🚫','Sans stockage']];
const STORE_HINT={here:'Valeur chiffrée dans le coffre karto.',bw:'Référencé dans Bitwarden — non dupliqué ici.',none:'Volontairement non stocké ici — c\'est la clé qui déverrouille le reste. Aucune valeur saisie.'};
const ATTR_OPTS=[
  ['Secret','secret',['API key','PAT (token)','Mot de passe','Token OAuth','Client secret']],
  ['Identité','id',['Login / identifiant','Email','Compte']],
  ['Informationnel','info',['Référence / ID','Région','URL / console','Domaine','Note technique']],
];
// --- présence Bitwarden (pastille) : matche un compte karto à l'annuaire bw-to-karto (account_registry).
//     Ne lit QUE des présences/noms de champs (jamais de valeur). Sync = vault-connect.mjs (lancé par l'utilisateur).
function isSecretLabel(k){ return /(api\s*key|\bpat\b|token|password|mot de passe|secret|service.?role|anon|access.?key|client.?secret|cl[ée]\s*api)/i.test(k||''); }
function _acctHost(a){ try{ return new URL(a.url).hostname.replace(/^www\./,'').toLowerCase(); }catch{ return ''; } }
function vaultInfo(a){
  const reg=(DATA.accountRegistry&&DATA.accountRegistry.accounts)||[];
  if(!reg.length) return {synced:false,matched:false};
  const h=_acctHost(a);
  const tok=((a.provider||'').toLowerCase().split(/[\s.\-(]/)[0])||(h.split('.')[0]||'');
  const hit=reg.find(r=>{ const hay=((r.domain||'')+' '+(r.name||'')).toLowerCase(); return (tok&&tok.length>2&&hay.includes(tok))||(h&&hay.includes(h)); });
  return hit?{synced:true,matched:true,hasPassword:!!hit.hasPassword,fields:hit.secretFields||[]}:{synced:true,matched:false};
}
function vaultBadge(label,vi){
  if(!vi.synced) return `<span class="vbadge vunk" title="Lance le sync Bitwarden (bw-to-karto) pour connaître la présence">🔐 coffre : ?</span>`;
  if(!vi.matched) return `<span class="vbadge vno" title="Aucun item Bitwarden correspondant à ce compte">🔓 hors coffre</span>`;
  const lk=(label||'').toLowerCase();
  const fieldHit=(vi.hasPassword&&/password|mot de passe|login|identifiant/.test(lk))||(vi.fields||[]).some(f=>{const fl=(f||'').toLowerCase();return (fl.includes('key')&&lk.includes('key'))||fl===lk||(fl.length>2&&lk.includes(fl))||(lk.length>2&&fl.includes(lk));});
  return fieldHit
    ? `<span class="vbadge vyes" title="Présent dans Bitwarden (coffre)">🔐 dans le coffre</span>`
    : `<span class="vbadge vpart" title="Compte présent dans Bitwarden, mais ce champ précis n'y a pas été identifié">🔐 compte présent</span>`;
}
