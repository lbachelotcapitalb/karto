/* ---------- FORCE GRAPH ---------- */
/* Cartographie 3D — moteur force-directed maison sur <canvas>, zéro dépendance.
   Profondeur réelle (rotation orbitale + perspective), thème néon sombre, labels
   désencombrés (seuls hubs / survol / sélection s'affichent, fondu selon la profondeur). */
function buildGraph(){
  const cv=document.getElementById('graph');
  const ctx=cv.getContext('2d');
  const nodes=DATA.graph.nodes.map((n,i)=>({...n,i}));
  const idx={}; nodes.forEach(n=>idx[n.id]=n);
  const edges=DATA.graph.edges.filter(e=>idx[e.s]&&idx[e.t]).map(e=>({s:idx[e.s],t:idx[e.t],kind:e.kind}));
  const deg={}; edges.forEach(e=>{deg[e.s.id]=(deg[e.s.id]||0)+1;deg[e.t.id]=(deg[e.t.id]||0)+1;});
  const N=nodes.length||1;
  const adj={}; nodes.forEach(n=>adj[n.id]=new Set([n.id])); edges.forEach(e=>{adj[e.s.id].add(e.t.id);adj[e.t.id].add(e.s.id);});

  // helpers
  const clamp=(v,a,b)=>v<a?a:v>b?b:v;
  function hexA(h,a){h=h.replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return `rgba(${r},${g},${b},${a})`;}
  function rrect(x,y,w,h,rad){ctx.beginPath();ctx.moveTo(x+rad,y);ctx.arcTo(x+w,y,x+w,y+h,rad);ctx.arcTo(x+w,y+h,x,y+h,rad);ctx.arcTo(x,y+h,x,y,rad);ctx.arcTo(x,y,x+w,y,rad);ctx.closePath();}

  // ---- init déterministe sur une sphère (spirale dorée) ----
  nodes.forEach((n,i)=>{
    const y=1-(i/(N-1||1))*2, rr=Math.sqrt(Math.max(0,1-y*y)), phi=i*2.39996323;
    n.x=Math.cos(phi)*rr*260; n.y=y*260; n.z=Math.sin(phi)*rr*260; n.vx=n.vy=n.vz=0;
  });
  // ---- layout force 3D (précalculé, ~75 nœuds → O(n²) sans souci) ----
  function step(){
    for(let a=0;a<N;a++)for(let b=a+1;b<N;b++){
      const A=nodes[a],B=nodes[b];let dx=A.x-B.x,dy=A.y-B.y,dz=A.z-B.z,d2=dx*dx+dy*dy+dz*dz||0.01;
      const f=9000/d2,d=Math.sqrt(d2),fx=dx/d*f,fy=dy/d*f,fz=dz/d*f;
      A.vx+=fx;A.vy+=fy;A.vz+=fz;B.vx-=fx;B.vy-=fy;B.vz-=fz;
    }
    edges.forEach(e=>{let dx=e.t.x-e.s.x,dy=e.t.y-e.s.y,dz=e.t.z-e.s.z,d=Math.sqrt(dx*dx+dy*dy+dz*dz)||0.01;const f=(d-150)*0.02,fx=dx/d*f,fy=dy/d*f,fz=dz/d*f;e.s.vx+=fx;e.s.vy+=fy;e.s.vz+=fz;e.t.vx-=fx;e.t.vy-=fy;e.t.vz-=fz;});
    nodes.forEach(n=>{n.vx-=n.x*0.002;n.vy-=n.y*0.002;n.vz-=n.z*0.002;n.vx*=0.85;n.vy*=0.85;n.vz*=0.85;n.x+=n.vx;n.y+=n.vy;n.z+=n.vz;});
  }
  for(let i=0;i<360;i++)step();
  let maxR=1; nodes.forEach(n=>{const r=Math.hypot(n.x,n.y,n.z);if(r>maxR)maxR=r;});

  // ---- caméra ----
  let yaw=0.6, pitch=-0.32, zoom=1; const FOCAL=900;
  let W=0,H=0,dirty=true; const DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){const wrap=cv.parentNode;W=wrap.clientWidth||1000;H=wrap.clientHeight||600;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);dirty=true;}
  resize(); window.addEventListener('resize',resize);

  const PROJ={};
  function project(n){
    const cy=Math.cos(yaw),sy=Math.sin(yaw);
    let X=n.x*cy-n.z*sy, Zt=n.x*sy+n.z*cy, Y=n.y;
    const cp=Math.cos(pitch),sp=Math.sin(pitch);
    const Y2=Y*cp-Zt*sp, Z=Y*sp+Zt*cp;
    const persp=FOCAL/(FOCAL-Z)*zoom;
    return {sx:W/2+X*persp, sy:H/2+Y2*persp, depth:Z, k:persp};
  }

  const offCats=()=>new Set([...document.querySelectorAll('#legend .li.off')].map(x=>x.dataset.c));
  let selected=null, hover=null, searchQ='', dragging=false;

  function frame(){
    if(cv.offsetParent===null){raf=requestAnimationFrame(frame);return;}  // onglet caché → boucle au ralenti, zéro dessin
    if(!dirty){raf=requestAnimationFrame(frame);return;}                  // graphe fixe → on ne redessine qu'au changement
    dirty=false;
    ctx.clearRect(0,0,W,H);
    const off=offCats();
    const vis=nodes.filter(n=>!off.has(n.cat));
    vis.forEach(n=>{PROJ[n.id]=project(n);});
    // arêtes
    edges.forEach(e=>{
      if(off.has(e.s.cat)||off.has(e.t.cat))return;
      const a=PROJ[e.s.id],b=PROJ[e.t.id]; if(!a||!b)return;
      const onSel=selected&&(e.s.id===selected||e.t.id===selected);
      const t=clamp(((a.depth+b.depth)/2+maxR)/(2*maxR),0,1);
      ctx.strokeStyle=onSel?hexA(catOf(idx[selected].cat).c,0.9):`rgba(150,162,225,${selected?0.05:0.06+t*0.16})`;
      ctx.lineWidth=onSel?1.8:1;
      ctx.beginPath();ctx.moveTo(a.sx,a.sy);ctx.lineTo(b.sx,b.sy);ctx.stroke();
    });
    // nœuds, arrière → avant
    const order=vis.slice().sort((p,q)=>PROJ[p.id].depth-PROJ[q.id].depth);
    order.forEach(n=>{
      const P=PROJ[n.id], col=catOf(n.cat).c;
      const r=Math.max(1.6,(4.5+Math.min(7,(deg[n.id]||0)*1.2))*P.k);
      const t=clamp((P.depth+maxR)/(2*maxR),0,1);
      const dim=searchQ&&!(n.label.toLowerCase().includes(searchQ)||(n.meta||'').toLowerCase().includes(searchQ));
      const sel=selected&&adj[selected].has(n.id);
      const alpha=dim?0.07:(selected&&!sel?0.12:0.4+t*0.6);
      const glowR=r*3.4;
      const g=ctx.createRadialGradient(P.sx,P.sy,0,P.sx,P.sy,glowR);
      g.addColorStop(0,hexA(col,0.5*alpha));g.addColorStop(1,hexA(col,0));
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(P.sx,P.sy,glowR,0,6.2832);ctx.fill();
      ctx.globalAlpha=alpha;
      ctx.beginPath();ctx.arc(P.sx,P.sy,r,0,6.2832);ctx.fillStyle=col;ctx.fill();
      ctx.lineWidth=Math.max(1,r*0.22);ctx.strokeStyle=hexA('#ffffff',0.85*alpha);ctx.stroke();
      if(n.id===hover||n.id===selected){ctx.globalAlpha=1;ctx.lineWidth=2;ctx.strokeStyle=hexA(col,1);ctx.beginPath();ctx.arc(P.sx,P.sy,r+3.5,0,6.2832);ctx.stroke();}
      ctx.globalAlpha=1; P._r=r;
    });
    // labels désencombrés
    const want=new Set();
    if(hover)want.add(hover);
    if(selected)adj[selected].forEach(id=>want.add(id));
    if(searchQ)vis.forEach(n=>{if(n.label.toLowerCase().includes(searchQ)||(n.meta||'').toLowerCase().includes(searchQ))want.add(n.id);});
    if(!selected&&!searchQ)vis.slice().sort((a,b)=>(deg[b.id]||0)-(deg[a.id]||0)).slice(0,9).forEach(n=>want.add(n.id));
    const rects=[];
    const lbls=[...want].map(id=>idx[id]).filter(n=>n&&!off.has(n.cat)).sort((a,b)=>PROJ[b.id].depth-PROJ[a.id].depth);
    ctx.font='600 11px Geist, system-ui, sans-serif';ctx.textBaseline='middle';
    lbls.forEach(n=>{
      const P=PROJ[n.id]; if(!P)return; const txt=n.label, w=ctx.measureText(txt).width, r=P._r||4;
      const lx=P.sx+r+6, ly=P.sy, rc={x:lx-4,y:ly-9,w:w+9,h:18};
      if(rects.some(o=>!(rc.x>o.x+o.w||rc.x+rc.w<o.x||rc.y>o.y+o.h||rc.y+rc.h<o.y)))return; // anti-chevauchement
      rects.push(rc);
      const isHL=n.id===hover||n.id===selected;
      ctx.fillStyle='rgba(8,5,26,.74)';rrect(rc.x,rc.y,rc.w,rc.h,5);ctx.fill();
      ctx.fillStyle=isHL?'#ffffff':'rgba(228,230,250,.92)';ctx.fillText(txt,lx,ly+0.5);
    });
    raf=requestAnimationFrame(frame);
  }
  let raf=requestAnimationFrame(frame);

  // ---- interactions ----
  function rel(ev){const b=cv.getBoundingClientRect();return {x:ev.clientX-b.left,y:ev.clientY-b.top};}
  function pick(mx,my){let best=null,bd=-1e9;nodes.forEach(n=>{const P=PROJ[n.id];if(!P)return;if(Math.hypot(mx-P.sx,my-P.sy)<=(P._r||4)+5&&P.depth>bd){bd=P.depth;best=n;}});return best;}
  let down=null,moved=0,lastp=null;
  cv.addEventListener('mousedown',ev=>{const p=rel(ev);down=pick(p.x,p.y);dragging=true;moved=0;lastp={x:ev.clientX,y:ev.clientY};});
  window.addEventListener('mousemove',ev=>{
    if(dragging){const dx=ev.clientX-lastp.x,dy=ev.clientY-lastp.y;moved+=Math.abs(dx)+Math.abs(dy);lastp={x:ev.clientX,y:ev.clientY};yaw+=dx*0.006;pitch=clamp(pitch+dy*0.006,-1.45,1.45);dirty=true;}
  });
  window.addEventListener('mouseup',ev=>{if(dragging&&moved<5){if(down)selectNode(down);else clearSel();}dragging=false;down=null;});
  cv.addEventListener('mousemove',ev=>{if(dragging)return;const p=rel(ev);const h=pick(p.x,p.y);const id=h?h.id:null;if(id!==hover){hover=id;dirty=true;}cv.style.cursor=h?'pointer':'grab';});
  cv.addEventListener('mouseleave',()=>{if(hover){hover=null;dirty=true;}});
  cv.addEventListener('wheel',ev=>{ev.preventDefault();zoom=clamp(zoom*(ev.deltaY<0?1.12:0.893),0.35,4.5);dirty=true;},{passive:false});

  function selectNode(n){
    selected=n.id;dirty=true;
    const links=[...adj[n.id]].filter(x=>x!==n.id).map(x=>idx[x]);
    const p=document.getElementById('gpanel');p.classList.add('on');
    p.innerHTML=`<div class="x" onclick="this.parentNode.classList.remove('on')">×</div>
      <span class="tag" style="background:${catOf(n.cat).c}22;color:${catOf(n.cat).c}">${esc(catOf(n.cat).l)}</span>
      <h3>${esc(n.label)}</h3>${n.meta?`<div class="kv">${esc(n.meta)}</div>`:''}
      <div class="kv" style="margin-top:10px"><b>${links.length}</b> connexion(s)</div>
      ${links.map(l=>`<div class="lk"><span class="dot-s" style="background:${catOf(l.cat).c}"></span>${esc(l.label)}</div>`).join('')}`;
  }
  function clearSel(){selected=null;dirty=true;document.getElementById('gpanel').classList.remove('on');}
  // fermeture du panneau → désélectionne aussi
  document.getElementById('gpanel').addEventListener('click',ev=>{if(ev.target.classList.contains('x')){selected=null;dirty=true;}});

  SIM={kick(){yaw=0.6;pitch=-0.32;zoom=1;selected=null;dirty=true;document.getElementById('gpanel').classList.remove('on');},highlight(q){searchQ=(q||'').toLowerCase();dirty=true;}};

  // légende + toggles (la visibilité est relue à chaque frame via offCats())
  const cats=[...new Set(nodes.map(n=>n.cat))];
  document.getElementById('legend').innerHTML=cats.map(c=>`<div class="li" data-c="${esc(c)}"><span class="sw" style="background:${catOf(c).c}"></span>${esc(catOf(c).l)}</div>`).join('');
  document.querySelectorAll('#legend .li').forEach(li=>li.onclick=()=>{li.classList.toggle('off');dirty=true;});
}
</script>
</body>
</html>
